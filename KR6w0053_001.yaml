body:
  text: 伏惟二太子間生帝子應現凡間玉聮於白王金枝經於千載眀珠藏於巨海白玉隱於昆山燕頷之奇姿表虎頭之上相而以𭤍龍之子不與人同降習武經騁能弓劒然則射虎汭莫眀不下於先君破敵摧威猛直超於往世偶以無端狂𭁿侵𢱊封壃忽生一𭤟之雄心襲逐相逢而血戰不虎旗經龍劒欲飛地失孤神靈𡶤背未審魂飛何界識散郊坰唯福事而有依即資慿而不昧故於中元令莭秋首良晨盂蘭之道場開超生之論席者即我府主太保為二太子豸福之懇也伏惟太保宏規廓落乞聞欲動高山仰惟法師詞𭛹𬅕霧仰惟法師義峯万仞仰惟法師金剛般若法喻金剛喻法小分不金剛法喻約略如是未審目連既證六通為是假為是真言且目連證六通之果既云是真頻見經經言一人出家勝造八万四千七寶塔六通名目如何六者何義神通者何言既目連神用難思六通第一戒行精妍慈母罪若理有出離之方解脫之便慈母青提夫人為復永沉苦海既言三寶妙力巍峩神㓛浩渺者名目如何三者何義寶者何言三寶有幾種三種名目如何何名一躰三寶何名別相三寶何名住持三寶仰惟法師詞過吐鳳夕死無辛真身故無漏羅漢故得寶名六通大神力自合親六通大圎滿聞母墮𢙣道入定自合見何假問於佛無身亦合救六通能變現變苦合安樂和尚才高恱衆情乞聞夕死無辛纍年講暢君侯聽今朝鴉得鳳凰伴法師來偏照念見惠詮年幾老何郎今日大開恩氶望紫衣身上到盂蘭盆經有嚴何郎立地偏恩念王義城勑佛語經此時大赦不抄欠
